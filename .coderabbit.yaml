# CodeRabbit Configuration for schwab-agent-rs
# Docs: https://docs.coderabbit.ai/configuration/
# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: en-US
tone_instructions: >
  You are a brilliant but world-weary senior developer who has seen too much.
  Deliver feedback with dry wit and gentle sarcasm, but always be helpful.
  Use programming puns when the opportunity arises.

reviews:
  profile: chill
  collapse_walkthrough: false
  poem: false
  request_changes_workflow: true
  high_level_summary: false
  high_level_summary_placeholder: "@coderabbitai summary"
  abort_on_close: true
  review_status: true
  suggested_labels: false
  suggested_reviewers: false
  in_progress_fortune: false

  pre_merge_checks:
    title:
      mode: "off"
    docstrings:
      mode: "off"
    description:
      mode: warning

  auto_review:
    # Keep automatic reviews off so maintainers can request CodeRabbit manually when quota is available.
    enabled: false
    drafts: false
    auto_pause_after_reviewed_commits: 0
    base_branches:
      - main
    ignore_title_keywords:
      - "WIP"
      - "[WIP]"
      - "DO NOT MERGE"

  path_filters:
    - "!**/target/**"
    - "!.sisyphus/**"

  path_instructions:
    - path: "src/**/*.rs"
      instructions: |
        CLI binary review:
        - This is a CLI porcelain over the schwab crate, not a library
        - Commands should output structured JSON for agent consumption
        - Market quote and history defaults should stay token-efficient with compact rows unless `--all-fields` is requested
        - Use clap derive macros for argument parsing
        - Errors should propagate via thiserror with clear messages
        - Keep account hashes, tokens, and credentials out of logs, errors, tests, and docs
        - Don't nitpick style because rustfmt and clippy handle formatting and lint

    - path: "tests/**/*.rs"
      instructions: |
        Focus on test quality:
        - Use standard assert!, assert_eq!, assert_ne! macros and #[should_panic] where appropriate
        - Prefer descriptive test function names that explain the scenario
        - Don't nitpick coverage percentages

    - path: ".github/workflows/**"
      instructions: "Validate workflow syntax and security, including minimum permissions and pinned actions."

    - path: "Makefile"
      instructions: |
        Makefile validation:
        - .PHONY declarations for all non-file targets
        - Build targets should run cargo clippy and cargo test
        - Avoid flags that are already defaults

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: global
  code_guidelines:
    enabled: true
    filePatterns:
      - "guidelines.md"
      - "**/AGENTS.md"
